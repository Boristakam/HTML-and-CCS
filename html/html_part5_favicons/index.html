<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"> <!-- character encoding - ensure emojies, accented letters, and non-english scipts are displayed correctly -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- for compatibility with older versions of Internet Explorer -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- makes webpage mobile friendly, matching the widtch and the initial zoom scale -->
        <!-- a favicon is a small icon that represents a website in the browser's address bar, tabs, and bookmarks -->
        <link rel="icon" type="image/jpg" href="images/favicon.jpg"> <!-- favicon link, the image should be in the specified path -->
        <title>Favicons webpage</title>
    </head>
    <body>
        <p>This webpage has a favicon! look in the address bar there should be an icon.</p>
       
    </body>
</html>
