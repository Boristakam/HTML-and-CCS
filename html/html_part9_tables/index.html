<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML Tables</title>
    </head>
    <body>
        <h3>Store Hours of Operation</h3>
        <table border="1" cellspacing="0" cellpadding="7"><!-- table element -->
            <tr align="center" style="background-color:aqua"><!-- table row -->
                <th width="70">Sunday</th><!-- table header -->
                <th width="70">Monday</th>
                <th width="70">Tuesday</th>
                <th width="70">Wednesday</th>
                <th width="70">Thursday</th>
                <th width="70">Friday</th>
                <th width="70">Saturday</th>
            </tr>
            <tr align="center">
                <td>closed</td><!-- table data -->
                <td>9-5</td>
                <td>9-5</td>
                <td>9-5</td>
                <td>9-5</td>
                <td>9-5</td>
                <td>10-2</td>
            </tr>

        </table>
    
    </body>
</html>
