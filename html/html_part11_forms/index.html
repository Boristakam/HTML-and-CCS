<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML Forms</title>
    </head>
    <body>
        <form action="index.php" method="POST" enctype="multipart/form-data"> <!-- action attribute specifies where to submit the form data 
        method attribute specifies if it's a GET or POST request, POST is for sensitive data -->
            <label for="username">username:</label>
            <input type="text" id="username" placeholder="Enter your username" minlength="3" maxlength="20" required> <!-- required attribute makes the field mandatory -->
            <br>
            <br>
            <label for="password">password:</label>
            <input type="password" id="password" placeholder="Enter your password" minlength="6" maxlength="15" required>
            <br>
            <br>
            <label for="email">email:</label>
            <input type="email" id="email" placeholder="Enter your email" required>
            <br>
            <br>
            <label for="phone">phone #:</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
            <br>
            <br>
            <label for="birthday">birthday:</label>
            <input type="date" id="birthday" required> <!-- the data attribute provides an interactive caledar -->
            <br>
            <br>
            <label for="quantity">quantity:</label>
            <input type="number" id="quantity" placeholder="Enter quantity" value="1" min="1" max="99" required>
            <br>
            <br>
            <label for="title">title:</label>
            <label for="Mr">Mr.</label>
            <input type="radio" id="Mr" name="title" value="Mr"> <!-- radio means only one can be selected if they all belong to the same group (title in this case)-->
            <label for="Mrs">Mrs.</label>
            <input type="radio" id="Mrs" name="title" value="Mrs">
            <label for="Ms">Ms.</label>
            <input type="radio" id="Ms" name="title" value="Ms">
            <br>
            <br>
            <label for="payment">payment method:</label>
            <select id="payment" name="payment" required>
                <option value="">Select a payment method</option>
                <option value="credit">Credit Card</option>
                <option value="debit">Debit Card</option>
                <option value="paypal">PayPal</option>
            </select>
            <br>
            <br>
            <label for="subscribe">subscribe:</label>
            <input type="checkbox" id="subscribe">
            <br>
            <br>
            <label for="comment">comment:</label>
            <textarea id="comment" rows="3" cols="25"></textarea>
            <br>
            <br>
            <label for="file">file:</label>
            <input type="file" id="file" accept=".jpg, .jpeg, .png, .pdf">
            <br>
            <br>
            <input type="reset"> <!-- reset button clears all the fields in the form -->
            <input type="submit">

        </form>
    </body>
</html>
