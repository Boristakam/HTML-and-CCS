<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/jpg" href="images/favicon.jpg">
        <title>HTML Headers and Footers</title>
    </head>
    <body>
        <header style="background-color: lightblue; padding: 20px; text-align: center;">
            <h1>Welcome to My Website</h1>
            <nav> <!-- what nav does is provide navigation links -->
                <a href="#home">Home</a> |
                <a href="#about">About</a> |
                <a href="#contact">Contact</a>
            </nav>
        </header>

        <main style="padding: 20px;">
            <h2 id="home">Home Section</h2>
            <p>This is the home section of the website.</p>

            <h2 id="about">About Section</h2>
            <p>This section contains information about the website.</p>

            <h2 id="contact">Contact Section</h2>
            <p>This section provides contact information.</p>
        </main>

        <footer style="background-color: lightgray; padding: 10px; text-align: center;">
            &copy; 2024 My Website. All rights reserved.
        </footer>
    </body>
</html>
