<!DOCTYPE html>
<!-- this html is about the creation of hyperlinks - they are digital references to data -->
<html>
    <head>
        <title>My first website</title>
    </head>
    <body>
        <a href="https://www.google.com"><!-- ancher plus attribute (name value pair that modify the behaviour of an elm) href means hyper text reference -->  
        click me
        </a>
        <br>
        <a href="https://www.google.com"
        target="_blank"> <!-- opens the hyperlink in a new webpage/tab -->   
        click me to open link in new tab
        </a>
        <br>
        <a href="https://www.google.com"
        target="_blank"
        title="goes to goole"> <!-- adds tooltip (text shown when hovering over a text or button) -->
        click me 
        </a>
        <br>
        <!-- now using a relative path/url. the above examples use absolute paths -->
        <a href="2_lyrics.html"
        target="_blank"
        title="lyrics to Parisienne by Gims">
        song lyric
        <br>
        <!-- hyperlink to the mail app on the machine. use keywork mailto followed by the address -->
        <a href="mailto:test@fake.com"
        target="_blank">
        email me
        </a>
    </body>
</html>
