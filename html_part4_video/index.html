<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"> <!-- character encoding - ensure emojies, accented letters, and non-english scipts are displayed correctly -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- for compatibility with older versions of Internet Explorer -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- makes webpage mobile friendly, matching the widtch and the initial zoom scale -->
        <title>Video webpage</title>
    </head>
    <body>
        <!-- unlike in the in the audio html here we implement the source element directly with the video tag
         but this way becomes less efficient if we need to provide multiple video formats -->
        <p>Motion Control of a Mobile Robot</p>
        <video src="videos/Motion Control of a Mobile Robot.mp4" width="500px" controls loop>
        </video>
    </body>
</html>
